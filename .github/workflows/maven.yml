name: JavaFX CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Build project
        run: mvn clean package

      - name: Run JavaFX with virtual display
        run: xvfb-run mvn javafx:run
